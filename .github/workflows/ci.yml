name: CI

# Runs the test suites on every push and PR. `main` auto-deploys to GitHub
# Pages, so this is the gate that keeps a broken build from reaching production.
# The project is zero-dependency (no node_modules), so there is no install step.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+ is required: browser-smoke.js / css-coverage.js drive Chrome
          # over CDP using the built-in global `WebSocket`, which only became a
          # global (no flag) in Node 22.4. On Node 20 they throw
          # "WebSocket is not defined".
          node-version: 22

      # Install Chrome and expose its path, so findBrowser() locates it
      # deterministically instead of relying on the runner image's layout.
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Unit + golden + americano tests
        run: npm test

      - name: CSS coverage report
        run: npm run css:coverage
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Browser smoke (headless Chrome)
        run: npm run test:browser
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
